<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amirthaganesh S | Portfolio </title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(13, 17, 23, 0.7);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: #e2e8f0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .viewport-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            opacity: 0.3;
        }

        .ambient-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%);
            z-index: -1;
            opacity: 0.5;
        }

        header {
            position: fixed;
            top: 0; width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 40px;
        }

        .nav-wrap {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0;
        }

        .nav-links-center {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 12px;
            transition: all 0.3s var(--transition);
            position: relative;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .social-icons {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            margin-left: auto;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text-dim);
            text-decoration: none;
            font-size: 16px;
            transition: all 0.3s var(--transition);
            position: relative;
            overflow: hidden;
        }

        .social-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 8px;
        }

        .social-icon.linkedin { color: #94a3b8; }
        .social-icon.linkedin::before { background: rgba(10, 102, 194, 0.15); }
        .social-icon.linkedin:hover { color: #0a66c2; border-color: #0a66c2; box-shadow: 0 0 14px rgba(10,102,194,0.4); }
        .social-icon.linkedin:hover::before { opacity: 1; }

        .social-icon.gmail { color: #94a3b8; }
        .social-icon.gmail::before { background: rgba(234, 67, 53, 0.15); }
        .social-icon.gmail:hover { color: #ea4335; border-color: #ea4335; box-shadow: 0 0 14px rgba(234,67,53,0.4); }
        .social-icon.gmail:hover::before { opacity: 1; }

        /* GitHub icon */
        .social-icon.github { color: #94a3b8; }
        .social-icon.github::before { background: rgba(240, 246, 252, 0.1); }
        .social-icon.github:hover { color: #f0f6fc; border-color: #f0f6fc; box-shadow: 0 0 14px rgba(240,246,252,0.25); }
        .social-icon.github:hover::before { opacity: 1; }

        .social-icon.tryhackme { color: #94a3b8; font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -1px; }
        .social-icon.tryhackme::before { background: rgba(212, 53, 53, 0.15); }
        .social-icon.tryhackme:hover { color: #d43535; border-color: #d43535; box-shadow: 0 0 14px rgba(212,53,53,0.4); }
        .social-icon.tryhackme:hover::before { opacity: 1; }

        .social-icon svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
            position: relative;
            z-index: 1;
        }

        .social-icon span {
            position: relative;
            z-index: 1;
        }

        .social-icon[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -34px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13,17,23,0.95);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            letter-spacing: 1px;
        }
        .social-icon:hover[data-tooltip]::after { opacity: 1; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 0;
            border-bottom: 1px solid var(--border);
        }

        .hero-flex {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 100px;
            align-items: center;
        }

        .status-dot {
            position: absolute;
            top: 25px; right: 25px;
            width: 10px; height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 15px #10b981;
            animation: pulse 2s infinite;
        }

        .cyber-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.4s var(--transition);
            position: relative;
            overflow: hidden;
        }

        .cyber-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(13, 17, 23, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .cyber-card:hover::before { left: 100%; }

        .btn-main {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            border-radius: 4px;
        }

        .btn-main:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px var(--accent);
        }

        h1 { font-size: 4rem; font-weight: 800; line-height: 1; margin-bottom: 20px; }

        .text-gradient {
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5
